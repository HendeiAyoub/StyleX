name: Build IPA
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install JS Dependencies
        run: |
          cd ShoppingModuleRN
          npm install

      - name: Install CocoaPods
        run: pod install

      # ---------- Certificate & Keychain ----------
      - name: Setup Keychain and Certificate
        env:
          P12_BASE64: ${{ secrets.CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import the certificate
          echo "$P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -A -T /usr/bin/codesign

          # Allow codesign to access the private key
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      # ---------- Provisioning Profiles (Main + Widget) ----------
      - name: Install Provisioning Profiles
        env:
          PROFILE_MAIN: ${{ secrets.PROVISIONING_PROFILE_MAIN }}
          PROFILE_WIDGET: ${{ secrets.PROVISIONING_PROFILE_WIDGET }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # Main app profile
          echo "$PROFILE_MAIN" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/main_profile.mobileprovision
          
          # Widget extension profile
          echo "$PROFILE_WIDGET" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/widget_profile.mobileprovision

          # Optional: verify profile UUIDs
          echo "Installed profiles:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      # ---------- Force Automatic Signing (Optional) ----------
      - name: Force Automatic Signing (if needed)
        run: |
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' \
            ShoppingApp.xcodeproj/project.pbxproj || true

      # ---------- Patch Bundle IDs & Team (Optional) ----------
      - name: Patch Bundle IDs and Team
        run: |
          sed -i '' 's/ml\.ShoppingApp\.ShoppingAppWidget/com.stylix.tryon.widget/g' \
            ShoppingApp.xcodeproj/project.pbxproj
          sed -i '' 's/ml\.ShoppingApp/com.stylix.tryon/g' \
            ShoppingApp.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = J38J9AUL72;/DEVELOPMENT_TEAM = 39Z5QDFQQG;/g' \
            ShoppingApp.xcodeproj/project.pbxproj

      # ---------- Build & Archive ----------
      - name: Build & Archive
        run: |
          xcodebuild \
            -workspace ShoppingApp.xcworkspace \
            -scheme ShoppingApp \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=39Z5QDFQQG \
            -allowProvisioningUpdates \
            archive \
            -archivePath $RUNNER_TEMP/app.xcarchive
        env:
          CODESIGN_ALLOCATE: /Applications/Xcode_16.4.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/codesign_allocate

      # ---------- Export IPA ----------
      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ShoppingApp-IPA
          path: ${{ runner.temp }}/ipa/*.ipa
