name: Build IPA
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate pbxproj after checkout
        run: |
          plutil -lint ShoppingApp.xcodeproj/project.pbxproj && echo "✅ pbxproj VALID after checkout" || echo "❌ pbxproj INVALID after checkout"
          echo "Line count: $(wc -l < ShoppingApp.xcodeproj/project.pbxproj)"

      - name: Install JS Dependencies
        run: |
          cd ShoppingModuleRN
          npm install

      - name: Install CocoaPods
        run: |
          pod install

      - name: Validate pbxproj after pod install
        run: |
          plutil -lint ShoppingApp.xcodeproj/project.pbxproj && echo "✅ pbxproj VALID after pod install" || echo "❌ pbxproj INVALID after pod install"
          echo "Line count: $(wc -l < ShoppingApp.xcodeproj/project.pbxproj)"

      - name: Install Certificate
        env:
          P12_BASE64: ${{ secrets.CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$P12_BASE64" | base64 --decode > $CERTIFICATE_PATH
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import $CERTIFICATE_PATH -k build.keychain -P "$P12_PASSWORD" -A
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Install Provisioning Profile
        env:
          PROVISION_BASE64: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > \
            ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/profile.mobileprovision

      - name: Force Automatic Signing
        run: |
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' \
            ShoppingApp.xcodeproj/project.pbxproj
          plutil -lint ShoppingApp.xcodeproj/project.pbxproj && echo "✅ VALID after Force Automatic Signing" || echo "❌ INVALID after Force Automatic Signing"

      - name: Patch Bundle ID and Team
        run: |
          sed -i '' 's/ml\.ShoppingApp\.ShoppingAppWidget/com.stylix.tryon.widget/g' \
            ShoppingApp.xcodeproj/project.pbxproj
          sed -i '' 's/ml\.ShoppingApp/com.stylix.tryon/g' \
            ShoppingApp.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = J38J9AUL72;/DEVELOPMENT_TEAM = 39Z5QDFQQG;/g' \
            ShoppingApp.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = 6DZRWX4XK8;/DEVELOPMENT_TEAM = 39Z5QDFQQG;/g' \
            ShoppingApp.xcodeproj/project.pbxproj
          plutil -lint ShoppingApp.xcodeproj/project.pbxproj && echo "✅ VALID after Patch Bundle ID" || echo "❌ INVALID after Patch Bundle ID"

      - name: Remove Widget From Build
        run: |
          python3 <<'PYEOF'
import re, sys

with open('ShoppingApp.xcodeproj/project.pbxproj', 'r') as f:
    content = f.read()

original_len = len(content.splitlines())

# Find widget target ID dynamically (don't rely on hardcoded IDs)
widget_target_match = re.search(
    r'(/\* Begin PBXNativeTarget section \*/.*?)'
    r'(\w{24}) /\* ShoppingAppWidgetExtension \*/ = \{',
    content, re.DOTALL
)

if widget_target_match:
    widget_id = widget_target_match.group(2)
    print(f"Found widget target ID: {widget_id}")
else:
    print("Widget target ID not found - searching by appex reference")
    widget_id = None

# 1. Remove the embed build file line (causes "embedded binary not signed" error)
content, n1 = re.subn(
    r'[^\n]*\.appex in Embed Foundation Extensions[^\n]*\n',
    '', content
)
print(f"Removed {n1} embed reference line(s)")

# 2. Remove target dependency reference in main target's dependencies array
if widget_id:
    content, n2 = re.subn(
        rf'[^\n]*{widget_id} /\* ShoppingAppWidgetExtension \*/[^\n]*\n',
        '', content
    )
    print(f"Removed {n2} target dependency line(s)")

new_len = len(content.splitlines())
print(f"Total lines removed: {original_len - new_len}")

with open('ShoppingApp.xcodeproj/project.pbxproj', 'w') as f:
    f.write(content)

print("Done")
PYEOF
          plutil -lint ShoppingApp.xcodeproj/project.pbxproj && echo "✅ VALID after Remove Widget" || echo "❌ INVALID after Remove Widget"

      - name: Remove Wallet Capability
        run: |
          sed -i '' '/com.apple.developer.pass-type-identifiers/,/\/array/d' \
            ShoppingApp/ShoppingApp.entitlements || true
          sed -i '' '/com.apple.wallet/d' \
            ShoppingApp/ShoppingApp.entitlements || true

      - name: Fix NSBundle Swift Error
        run: |
          sed -i '' 's/NSBundle\.main/Bundle.main/g' \
            ShoppingApp/managers/BridgeManager.swift

      - name: Unlock Keychain
        run: |
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain

      - name: Build & Archive
        run: |
          xcodebuild \
            -workspace ShoppingApp.xcworkspace \
            -scheme ShoppingApp \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=39Z5QDFQQG \
            -allowProvisioningUpdates \
            archive \
            -archivePath $RUNNER_TEMP/app.xcarchive
        env:
          CODESIGN_ALLOCATE: /Applications/Xcode_16.4.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/codesign_allocate

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ShoppingApp-IPA
          path: ${{ runner.temp }}/ipa/*.ipa
